# Citation/dependency graph, built by scanning the PDFs in references/ with pdftotext.
# edge A -> B  means: paper A's text mentions/cites B.
# Proxy: a mention anywhere in A (body or reference list). Not hand-verified.
# Regenerate: python3 site/citegraph.py --write
citations:
  # Hand-verified against the bibliographies, 2026-07-11. All three edges stay inside the
  # federated (verify-train) column -- ACORN and EIFFeL cite each other, RoFL and Prio, and
  # nothing in the privacy column. No crossing edge introduced.
  acorn:
    - eiffel   # "[14] ... EIFFeL: Ensuring Integrity for Federated Learning"
    - prio     # "[15] H. Corrigan-Gibbs and D. Boneh. 'Prio: Private, Robust, and Scalable...'"
    - rofl     # "[33] ... 'RoFL: Attestable Robustness for Secure Federated Learning'"
  eiffel:
    - prio     # "[28] Henry Corrigan-Gibbs and Dan Boneh. Prio: Private, robust, and scalable..."
    - rofl     # "[23] ... Table 3 compares EIFFeL with prior work ... RoFL"
  # tee-confidential-llm cites NOTHING in this corpus. Verified: the strings "zero-knowledge",
  # "zkML", "SNARK" and "proof of" appear zero times in it. (A grep hit on "Prio" was the word
  # "Prior".) Deliberately absent from this graph rather than silently omitted.
  # Bionetta, hand-verified against its bibliography and a full-text scan of the PDF, 2026-07-11.
  # It cites the six zkML systems it benchmarks against, plus GKR and Lasso as building blocks.
  # It cites NOTHING from the privacy column and NOTHING from the numerics shelf -- confirmed by
  # counting occurrences in `pdftotext` output: "MPC" 0, "homomorphic" 0, "SIRNN" 0, "Cheetah" 0,
  # "SecFloat" 0, "ZKLP" 0, "Mystique" 0. It nonetheless derives a fixed-point quantization error
  # bound from first principles in its Appendix C, which is precisely the subject matter of the
  # papers it does not cite. Another node at the centre of the verifiability column that reaches
  # into none of the arithmetic literature. No crossing edge introduced.
  bionetta:
    - deepprove   # "[Lab25a] Lagrange Labs. deep-prove"; benchmarked in Fig. 6
    - ezkl        # "[Sou+24] Tobin South et al."; benchmarked in Table 4
    - gkr         # "[GKR15] Goldwasser, Kalai, Rothblum"
    - lasso       # "[STW24] Setty, Thaler, Wahby. Unlocking the Lookup Singularity with Lasso"
    - zkcnn       # "[LXZ21]"; benchmarked in Table 4
    - zkgpt       # "[Qu+] zkGPT ... USENIX Security 2025"; complexity comparison, Table 2
    - zkml-kang   # "[Che+24] ZKML: An Optimizing System..."; benchmarked in Table 4
    - zkpytorch   # "[Xie+25]"; "look forward to testing it in the future, yet currently it is
                  # not available for public use (as of December 2025)"
  bolt:
    - cheetah
    - iron
    - secfloat
    - sirnn
    - the-x
  bootstrapping-fhe:
    - bolt
    - bumblebee
    - cheetah
    - ciphergpt
